# =============================================================================
# 信贷风险分析系统 v3.0 - 顶层 Docker Compose（便捷入口）
# 用法：在项目根目录执行 docker compose up --build -d
# =============================================================================

services:
  financial-report:
    build:
      context: .
      dockerfile: Dockerfile
    image: credit-risk-analysis:3.0
    container_name: financial_report_system
    ports:
      - "${SERVER_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      - ./uploads:/app/uploads
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Asia/Shanghai
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8000
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - TASK_TIMEOUT=${TASK_TIMEOUT:-300}
      - MAX_FILE_SIZE=${MAX_FILE_SIZE:-50}
      - PDF_ENABLED=${PDF_ENABLED:-true}
      - MSCORE_SAFE=${MSCORE_SAFE:--2.22}
      - MSCORE_WARN=${MSCORE_WARN:--1.78}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
