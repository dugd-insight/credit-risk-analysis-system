<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>信贷风险分析系统 v2.1.2</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        .header h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .header p {
            font-size: 16px;
            opacity: 0.9;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .form-group {
            margin-bottom: 24px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
            font-size: 14px;
        }
        input[type="text"], select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 15px;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        .file-upload {
            position: relative;
            display: block;
        }
        .file-upload input {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }
        .file-upload-area {
            padding: 40px 20px;
            border: 2px dashed #d1d5db;
            border-radius: 10px;
            text-align: center;
            transition: all 0.2s;
            background: #f9fafb;
        }
        .file-upload:hover .file-upload-area {
            border-color: #667eea;
            background: #f0f0ff;
        }
        .file-upload-area .icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
        .file-upload-area .text {
            color: #6b7280;
            font-size: 14px;
        }
        .file-upload-area .text strong {
            color: #667eea;
        }
        .file-list {
            margin-top: 12px;
        }
        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            background: #f0f0ff;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 13px;
        }
        .file-item .name {
            color: #333;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .file-item .remove {
            color: #dc2626;
            cursor: pointer;
            margin-left: 10px;
        }
        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .note {
            font-size: 12px;
            color: #9ca3af;
            margin-top: 6px;
        }
        .error {
            background: #fef2f2;
            color: #dc2626;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            display: none;
        }
        .error.show {
            display: block;
        }

        /* 分析进度区域 */
        .progress-area {
            margin-top: 30px;
            display: none;
        }
        .progress-area.show {
            display: block;
        }
        .progress-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            text-align: center;
        }
        .progress-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        .progress-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 16px;
        }
        .progress-bar-container {
            background: #e5e7eb;
            border-radius: 10px;
            height: 10px;
            overflow: hidden;
            margin-bottom: 12px;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            transition: width 0.3s ease;
            width: 0%;
        }
        .progress-steps {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #666;
        }
        .progress-step {
            text-align: center;
            flex: 1;
            padding: 8px 4px;
            opacity: 0.4;
            transition: all 0.3s;
        }
        .progress-step.active {
            opacity: 1;
            color: #667eea;
            font-weight: 600;
        }
        .progress-step.done {
            opacity: 1;
            color: #22c55e;
        }
        .progress-detail {
            font-size: 13px;
            color: #666;
            margin-top: 10px;
        }

        /* 结果展示区域 */
        .result {
            margin-top: 30px;
            display: none;
        }
        .result.show {
            display: block;
        }
        .result h3 {
            color: #1e40af;
            margin-bottom: 15px;
            font-size: 18px;
        }
        .result .summary {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .result .summary-item {
            background: #f9fafb;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .result .summary-item .label {
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 5px;
        }
        .result .summary-item .value {
            font-size: 24px;
            font-weight: 600;
            color: #1f2937;
        }
        .result .summary-item .grade {
            font-size: 32px;
            font-weight: 700;
        }
        .result .summary-item .grade.grade-aaa { color: #059669; }
        .result .summary-item .grade.grade-aa { color: #10b981; }
        .result .summary-item .grade.grade-a { color: #34d399; }
        .result .summary-item .grade.grade-bbb { color: #f59e0b; }
        .result .summary-item .grade.grade-bb { color: #f97316; }
        .result .summary-item .grade.grade-b { color: #ef4444; }
        .result .summary-item .grade.grade-ccc { color: #dc2626; }
        .result .suggestion {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            padding: 12px 16px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 14px;
            color: #166534;
        }
        .result .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
            justify-content: center;
        }
        .result .download-btn {
            display: inline-block;
            padding: 14px 24px;
            background: #1f2937;
            color: white;
            text-align: center;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 500;
            transition: background 0.2s;
        }
        .result .download-btn.pdf {
            background: #dc2626;
        }
        .result .download-btn.pdf:hover {
            background: #b91c1c;
        }
        .result .download-btn:hover {
            background: #374151;
        }

        /* 动画 */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .spinning {
            animation: spin 1s linear infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏦 信贷风险分析系统</h1>
            <p>上传财务报表，智能分析企业信用风险</p>
        </div>

        <div class="card">
            <form id="analyzeForm">
                <div class="form-group">
                    <label>企业名称</label>
                    <input type="text" name="company_name" id="companyName" required placeholder="请输入企业全称">
                </div>

                <div class="form-group">
                    <label>行业分类</label>
                    <select name="industry" id="industry" required>
                        <option value="担保/金融服务">担保/金融服务</option>
                        <option value="制造业">制造业</option>
                        <option value="零售/批发">零售/批发</option>
                        <option value="建筑/地产">建筑/地产</option>
                        <option value="农业/食品">农业/食品</option>
                        <option value="通用">通用</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>上传财务报表</label>
                    <div class="file-upload">
                        <input type="file" name="files" id="fileInput" multiple accept=".xls,.xlsx" required>
                        <div class="file-upload-area">
                            <div class="icon">📁</div>
                            <div class="text">
                                <strong>点击选择文件</strong> 或拖拽文件到此处<br>
                                支持 .xls、.xlsx 格式
                            </div>
                        </div>
                    </div>
                    <div class="file-list" id="fileList"></div>
                    <div class="note">支持多期数据同时上传，系统会自动识别并对比分析</div>
                </div>

                <button type="submit" class="btn" id="submitBtn">🔍 开始分析</button>
            </form>

            <div class="error" id="errorMsg"></div>

            <!-- 分析进度区域 -->
            <div class="progress-area" id="progressArea">
                <div class="progress-card">
                    <div class="progress-icon" id="progressIcon">⏳</div>
                    <div class="progress-title" id="progressTitle">正在上传文件...</div>
                    <div class="progress-bar-container">
                        <div class="progress-bar" id="progressBar"></div>
                    </div>
                    <div class="progress-steps">
                        <div class="progress-step" id="step1">📤 上传</div>
                        <div class="progress-step" id="step2">📊 分析</div>
                        <div class="progress-step" id="step3">📄 生成报告</div>
                        <div class="progress-step" id="step4">📥 导出</div>
                    </div>
                    <div class="progress-detail" id="progressDetail"></div>
                </div>
            </div>

            <!-- 结果展示区域 -->
            <div class="result" id="resultArea">
                <h3>✅ 分析完成！</h3>
                <div class="summary">
                    <div class="summary-item">
                        <div class="label">信用等级</div>
                        <div class="value grade" id="resultGrade">-</div>
                    </div>
                    <div class="summary-item">
                        <div class="label">综合评分</div>
                        <div class="value" id="resultScore">-</div>
                    </div>
                    <div class="summary-item" style="grid-column: span 2;">
                        <div class="label">授信建议</div>
                        <div class="value" style="font-size: 16px;" id="resultSuggestion">-</div>
                    </div>
                </div>
                <div class="suggestion" id="resultDetail" style="display: none;"></div>
                <div class="btn-group">
                    <a href="#" class="download-btn" id="downloadHtmlBtn">📄 查看网页报告</a>
                    <a href="#" class="download-btn pdf" id="downloadPdfBtn">📥 下载PDF报告</a>
                    <a href="#" class="download-btn" id="newAnalysisBtn">🔄 新建分析</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // DOM 元素
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const form = document.getElementById('analyzeForm');
        const submitBtn = document.getElementById('submitBtn');
        const errorMsg = document.getElementById('errorMsg');
        const progressArea = document.getElementById('progressArea');
        const resultArea = document.getElementById('resultArea');

        // 轮询间隔（毫秒）
        const POLL_INTERVAL = 1000;
        let pollTimer = null;

        // 显示已选文件
        fileInput.addEventListener('change', function() {
            fileList.innerHTML = '';
            Array.from(this.files).forEach(file => {
                const item = document.createElement('div');
                item.className = 'file-item';
                item.innerHTML = `
                    <span class="name">📊 ${file.name}</span>
                `;
                fileList.appendChild(item);
            });
        });

        // 更新进度
        function updateProgress(step, percent, title, detail) {
            document.getElementById('progressTitle').textContent = title || '';
            document.getElementById('progressBar').style.width = percent + '%';
            if (detail) {
                document.getElementById('progressDetail').textContent = detail;
            }

            ['step1', 'step2', 'step3', 'step4'].forEach((id, idx) => {
                const el = document.getElementById(id);
                el.classList.remove('active', 'done');
                if (idx < step) el.classList.add('done');
                else if (idx === step) el.classList.add('active');
            });

            const icons = ['📤', '📊', '📄', '📥', '✅'];
            const iconEl = document.getElementById('progressIcon');
            iconEl.textContent = icons[step] || '⏳';
            if (step === 1) {
                iconEl.classList.add('spinning');
            } else {
                iconEl.classList.remove('spinning');
            }
        }

        // 获取等级样式类
        function getGradeClass(grade) {
            const gradeMap = {
                'AAA': 'grade-aaa',
                'AA': 'grade-aa',
                'A': 'grade-a',
                'BBB': 'grade-bbb',
                'BB': 'grade-bb',
                'B': 'grade-b',
                'CCC': 'grade-ccc',
            };
            return gradeMap[grade] || '';
        }

        // 显示结果
        function showResult(data) {
            stopPolling();
            progressArea.classList.remove('show');
            resultArea.classList.add('show');

            const grade = data.summary?.grade || '-';
            const gradeEl = document.getElementById('resultGrade');
            gradeEl.textContent = grade;
            gradeEl.className = 'value grade ' + getGradeClass(grade);

            document.getElementById('resultScore').textContent =
                (data.summary?.total_score?.toFixed(1) || '-') + ' 分';
            document.getElementById('resultSuggestion').textContent =
                data.summary?.suggestion || '-';

            // 设置下载链接
            const htmlBtn = document.getElementById('downloadHtmlBtn');
            const pdfBtn = document.getElementById('downloadPdfBtn');

            htmlBtn.href = data.report_url || '#';
            if (data.pdf_url) {
                pdfBtn.href = data.pdf_url;
                pdfBtn.style.display = 'inline-block';
            } else {
                pdfBtn.style.display = 'none';
            }
        }

        // 显示错误
        function showError(msg) {
            stopPolling();
            errorMsg.textContent = msg;
            errorMsg.classList.add('show');
            progressArea.classList.remove('show');
            resultArea.classList.remove('show');
            submitBtn.disabled = false;
            submitBtn.textContent = '🔍 开始分析';
        }

        // 开始轮询任务状态
        function startPolling(taskId) {
            stopPolling();

            pollTimer = setInterval(async () => {
                try {
                    const response = await fetch(`/api/task/${taskId}`);
                    if (!response.ok) {
                        throw new Error('查询任务状态失败');
                    }

                    const status = await response.json();

                    // 更新进度显示
                    if (status.message) {
                        document.getElementById('progressDetail').textContent = status.message;
                    }

                    // 根据进度更新步骤
                    if (status.progress < 20) {
                        updateProgress(0, status.progress, '正在上传文件...');
                    } else if (status.progress < 50) {
                        updateProgress(1, status.progress, '正在分析财务数据...');
                    } else if (status.progress < 85) {
                        updateProgress(2, status.progress, '正在生成报告...');
                    } else {
                        updateProgress(3, status.progress, '报告生成中...');
                    }

                    // 检查任务状态
                    if (status.status === 'completed' && status.result) {
                        if (status.result.success) {
                            showResult(status.result);
                        } else {
                            showError(status.result.error || '分析失败');
                        }
                    } else if (status.status === 'failed') {
                        showError(status.error || '任务执行失败');
                    }

                } catch (error) {
                    console.error('轮询错误:', error);
                }
            }, POLL_INTERVAL);
        }

        // 停止轮询
        function stopPolling() {
            if (pollTimer) {
                clearInterval(pollTimer);
                pollTimer = null;
            }
        }

        // 重置表单
        function resetForm() {
            form.reset();
            fileList.innerHTML = '';
            errorMsg.classList.remove('show');
            progressArea.classList.remove('show');
            resultArea.classList.remove('show');
            submitBtn.disabled = false;
            submitBtn.textContent = '🔍 开始分析';
            stopPolling();
        }

        // 新建分析按钮
        document.getElementById('newAnalysisBtn').addEventListener('click', function(e) {
            e.preventDefault();
            resetForm();
        });

        // 提交表单
        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            const files = fileInput.files;

            if (files.length === 0) {
                showError('请选择至少一个财务文件');
                return;
            }

            // 显示进度
            submitBtn.disabled = true;
            submitBtn.textContent = '分析中...';
            errorMsg.classList.remove('show');
            resultArea.classList.remove('show');
            progressArea.classList.add('show');
            updateProgress(0, 10, '正在上传文件...');

            const formData = new FormData();
            formData.append('company_name', document.getElementById('companyName').value);
            formData.append('industry', document.getElementById('industry').value);
            for (let i = 0; i < files.length; i++) {
                formData.append('files', files[i]);
            }

            try {
                // 优先使用异步接口
                let apiUrl = '/api/analyze-async';
                let useAsync = true;

                // 先尝试异步接口
                const asyncResponse = await fetch(apiUrl, {
                    method: 'POST',
                    body: formData
                });

                const asyncData = await asyncResponse.json();

                if (!asyncResponse.ok) {
                    // 如果异步接口失败，尝试同步接口
                    console.log('异步接口失败，尝试同步接口...');
                    useAsync = false;
                } else if (asyncData.task_id) {
                    // 异步接口成功，开始轮询
                    updateProgress(1, 30, '文件上传完成，正在分析...');
                    startPolling(asyncData.task_id);
                    return;
                }

                // 如果异步接口不可用，使用同步接口
                if (!useAsync) {
                    const syncResponse = await fetch('/api/analyze', {
                        method: 'POST',
                        body: formData
                    });

                    const data = await syncResponse.json();

                    if (!syncResponse.ok) {
                        throw new Error(data.detail || '分析失败');
                    }

                    if (data.success) {
                        updateProgress(2, 75, '正在生成报告...');
                        await new Promise(r => setTimeout(r, 300));
                        updateProgress(3, 90, '报告生成完成！');
                        await new Promise(r => setTimeout(r, 200));
                        showResult(data);
                    } else {
                        throw new Error(data.detail || '分析失败');
                    }
                }

            } catch (error) {
                showError(error.message || '网络错误，请重试');
            }
        });
    </script>
</body>
</html>
